name: Build Nokia Storage APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev automake

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Build debug APK (attempt 1)
        id: build1
        continue-on-error: true
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        shell: bash

      - name: Retry build if failed (attempt 2)
        id: build2
        if: steps.build1.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "First attempt failed, retrying..."
          sleep 30
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        shell: bash

      - name: Retry build if failed (attempt 3)
        id: build3
        if: steps.build1.outcome == 'failure' && steps.build2.outcome == 'failure'
        run: |
          echo "Second attempt failed, retrying with clean..."
          sleep 60
          rm -rf .buildozer/android/platform/build-arm64-v8a/build/bootstrap_builds/sdl2/jni/SDL2_image/external/libjxl || true
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        shell: bash

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Show error on failure
        if: failure()
        run: |
          echo "=== LAST 100 LINES ==="
          tail -100 build.log
          echo "=== ERRORS ==="
          grep -i "error\|fatal\|failed" build.log | grep -v "^#" | tail -20 || true

      - name: Upload APK
        if: steps.build1.outcome == 'success' || steps.build2.outcome == 'success' || steps.build3.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nokia-storage-apk
          path: bin/*.apk
          retention-days: 30
