name: Build Nokia Storage APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev automake

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Configure git for submodule retries
        run: |
          git config --global http.retryCount 5
          git config --global http.retryDelay 10

      - name: Cache debug keystore (FIXED KEY for consistent signing)
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/.keystore-backup
          key: nokia-debug-keystore-v2
          restore-keys: |
            nokia-debug-keystore-v2
            nokia-debug-keystore-v1

      - name: Create or restore debug keystore
        run: |
          mkdir -p ~/.android ~/.keystore-backup
          # Restore from backup if it exists but ~/.android doesn't have it
          if [ -f ~/.keystore-backup/debug.keystore ] && [ ! -f ~/.android/debug.keystore ]; then
            cp ~/.keystore-backup/debug.keystore ~/.android/debug.keystore
            echo "Restored keystore from backup"
          fi
          # Create if still missing (first run only)
          if [ ! -f ~/.android/debug.keystore ]; then
            echo "Creating new debug keystore..."
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -dname "CN=Nokia Storage, OU=Debug, O=ICT18, L=Dubai, S=Dubai, C=AE"
          fi
          # Always copy to backup so it survives in cache
          cp ~/.android/debug.keystore ~/.keystore-backup/debug.keystore
          echo "Keystore SHA1:"
          keytool -list -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey | grep SHA1 || true

      - name: Cache buildozer build directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: |
          for attempt in 1 2 3; do
            echo "=== BUILD ATTEMPT $attempt ==="
            if buildozer android debug 2>&1 | tee build.log; then
              echo "BUILD SUCCESS on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed, cleaning and retrying in 60s..."
            rm -rf .buildozer/android/platform/build-arm64-v8a/build/bootstrap_builds/sdl2/jni/SDL2_image/external/libjxl/third_party/skcms 2>/dev/null || true
            sleep 60
          done
          echo "All 3 attempts failed"
          exit 1
        shell: bash

      - name: Verify APK signature
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          echo "APK: $APK"
          keytool -printcert -jarfile "$APK" | head -20 || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Show error on failure
        if: failure()
        run: |
          echo "=== ERRORS ==="
          grep -i "error\|fatal\|failed" build.log | grep -v "^#" | tail -30 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nokia-storage-apk
          path: bin/*.apk
          retention-days: 30
